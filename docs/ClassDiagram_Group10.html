<!--
════════════════════════════════════════════════════════════════════
LAYOUT PLAN  (canvas 1900 × 1720)

Row 1  y=40–280    USER               (centered near top)
Row 2  y=360–640   ADMIN + CASHIER   (two children, inherit from User)
Row 3  y=730–1090  CATEGORY | PRODUCT | INVENTORY | BILL | DISCOUNT | TRANSACTION
Row 4  y=1180–1490 REFUND | SALES REPORT | SESSION MANAGER | SETTINGS

Horizontal routing lanes (clear of all boxes):
  y=320   between row 1 bottom (280) and row 2 top (360)
  y=690   between row 2 bottom (640) and row 3 top (730)
  y=1140  between row 3 bottom (1090) and row 4 top (1180)
  y=1550  below row 4

Vertical routing lanes (gutters between columns):
  Left margin:  x=30
  Right margin: x=1870
  Between Category (end x=330)  and Product (start x=360):    x=345
  Between Product (end x=640)   and Inventory (start x=670):  x=655
  Between Inventory (end x=940) and Bill (start x=970):       x=955
  Between Bill (end x=1260)     and Discount (start x=1290):  x=1275
  Between Discount (end x=1560) and Transaction (start x=1590): x=1575

All connector polylines bend only at right angles along these lanes.
════════════════════════════════════════════════════════════════════
-->
<svg class="diagram" width="1900" height="1720" xmlns="http://www.w3.org/2000/svg">

<defs>
  <!-- Inheritance: hollow triangle on parent side -->
  <marker id="inh" markerWidth="14" markerHeight="12" refX="13" refY="6" orient="auto" markerUnits="strokeWidth">
    <polygon points="1,1 13,6 1,11" fill="#fff" stroke="#111" stroke-width="1.4"/>
  </marker>
  <!-- Association: simple filled arrow -->
  <marker id="arr" markerWidth="11" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
    <polygon points="0,1 10,5 0,9 3,5" fill="#111"/>
  </marker>
  <!-- Composition: filled diamond at start -->
  <marker id="comp" markerWidth="14" markerHeight="10" refX="1" refY="5" orient="auto" markerUnits="strokeWidth">
    <polygon points="1,5 7,1 13,5 7,9" fill="#111" stroke="#111" stroke-width="1"/>
  </marker>
  <!-- Aggregation: hollow diamond at start -->
  <marker id="agg" markerWidth="14" markerHeight="10" refX="1" refY="5" orient="auto" markerUnits="strokeWidth">
    <polygon points="1,5 7,1 13,5 7,9" fill="#fff" stroke="#111" stroke-width="1.2"/>
  </marker>
</defs>

  <text x="802" y="146" class="attr">− password : string</text>

  <line x1="1460" y1="1216" x2="1740" y2="1216" stroke="#111" stroke-width="1.2"/>
  <text x="1600" y="1206" text-anchor="middle" class="cls-name">Settings</text>
  <!-- attributes -->
  <text x="1472" y="1236" class="attr">− theme : string</text>
  <text x="1472" y="1254" class="attr">− language : string</text>
  <text x="1472" y="1272" class="attr">− currency : string</text>
  <line x1="1460" y1="1286" x2="1740" y2="1286" stroke="#111" stroke-width="1"/>
  <!-- methods -->
  <text x="1472" y="1304" class="method">+ toggleTheme() : void</text>
  <text x="1472" y="1322" class="method">+ saveToFile() : void</text>
  <text x="1472" y="1340" class="method">+ loadFromFile() : void</text>
  <text x="1472" y="1358" class="method">+ applyTheme() : void</text>
</g>


<!-- ═══════════════════════════════════════════════════════════════
     RELATIONSHIPS  (strictly orthogonal, no crossings)
     ═══════════════════════════════════════════════════════════════ -->

<!-- 1. Admin ──▷ User (inheritance)
     From Admin top (570, 360) up to User bottom (900, 280)
     Route: (570,360) → (570,320) → (900,320) → (900,280)  -->
<polyline points="570,360 570,320 900,320 900,280"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#inh)"/>

<!-- 2. Cashier ──▷ User (inheritance)
     From Cashier top (1310, 360) up to User bottom (980, 280)
     Route: (1310,360) → (1310,320) → (980,320) → (980,280)  -->
<polyline points="1310,360 1310,320 980,320 980,280"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#inh)"/>

<!-- ═══════════════════════════════════════════════════════════════
     LABEL SPACING RULES (applied consistently below):
       • Relationship label sits ABOVE the line, ~10px clear of it.
       • Cardinality sits BELOW the line, ~12px clear of it.
       • Cardinalities sit ~15px AWAY from the arrowhead/diamond,
         not right on top of it.
       • For vertical segments, labels are rotated and offset ~14px
         away from the line.
     ═══════════════════════════════════════════════════════════════ -->

<!-- 3. Product ───▶ Category (belongs to, 0..* → 1)
     Routed DOWN and around via the y=1080 lane.
     Route: (400,1010) → (400,1080) → (200,1080) → (200,990)
     Label positioned BELOW the horizontal line so it doesn't stack
     on top of the cardinalities (which sit on the vertical segments). -->
<polyline points="400,1010 400,1080 200,1080 200,990"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#arr)"/>
<text x="300" y="1100" text-anchor="middle" class="rlbl">belongs to</text>
<!-- card at Product side (start of line, on vertical segment, below box) -->
<text x="408" y="1032" class="card">0..*</text>
<!-- card at Category side (end of line, on vertical segment above arrow) -->
<text x="208" y="1012" class="card">1</text>

<!-- 4. Inventory ◆──▶ Product (composition, 1 → 1..*)
     Routed DOWN via y=1095 lane (just above row 4's y=1180 top edge).
     Route: Inventory bottom (720, 970) → down → left → up → Product bottom (600, 1010)
            (720,970) → (720,1095) → (600,1095) → (600,1010) -->
<polyline points="720,970 720,1095 600,1095 600,1010"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-start="url(#comp)" marker-end="url(#arr)"/>
<text x="660" y="1087" text-anchor="middle" class="rlbl">owns</text>
<!-- card at Inventory side (start, vertical segment, offset right) -->
<text x="728" y="986" class="card">1</text>
<!-- card at Product side (end, vertical segment, BELOW Product bottom at y=1010
     so it sits outside the class, not inside) -->
<text x="608" y="1024" class="card">1..*</text>

<!-- 5. Bill ◇──▶ Product (aggregation, 1 → 1..*)
     Long path along y=1120 lane. Plenty of room.
     Route: (1000,1050) → (1000,1120) → (500,1120) → (500,1010)
     Label ABOVE the horizontal segment.
     Cardinalities placed ~25px AWAY from the start diamond and end arrow. -->
<polyline points="1000,1050 1000,1120 500,1120 500,1010"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-start="url(#agg)" marker-end="url(#arr)"/>
<text x="750" y="1110" text-anchor="middle" class="rlbl">contains</text>
<!-- card near Bill (start of line, vertical segment) - offset to the right -->
<text x="1012" y="1080" class="card">1</text>
<!-- card near Product (end of line, vertical segment) - offset to the right -->
<text x="512" y="1024" class="card">1..*</text>

<!-- 6. Bill ───▶ Discount (applies, 1 → 0..1)
     Route: (1200,1050) → (1200,1095) → (1400,1095) → (1400,970)
     Label positioned BELOW the horizontal line at y=1095 for clean separation
     from the cardinalities placed on the vertical segments. -->
<polyline points="1200,1050 1200,1095 1400,1095 1400,970"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#arr)"/>
<text x="1300" y="1108" text-anchor="middle" class="rlbl">applies</text>
<!-- card at Bill (start, on vertical segment, below Bill box) -->
<text x="1208" y="1072" class="card">1</text>
<!-- card at Discount (end, on vertical segment above arrow) -->
<text x="1408" y="992" class="card">0..1</text>

<!-- 7. Bill ───▶ Transaction (generates, 1 → 1)
     Route: (1150,730) → (1150,700) → (1730,700) → (1730,730)
     Long horizontal segment at y=700 with ample room.
     Label ABOVE at y=688. Cardinalities ON vertical segments with offset. -->
<polyline points="1150,730 1150,700 1730,700 1730,730"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#arr)"/>
<text x="1440" y="690" text-anchor="middle" class="rlbl">generates</text>
<!-- card at Bill end (start) - to the right of vertical line -->
<text x="1158" y="722" class="card">1</text>
<!-- card at Transaction end (arrow) - to the right of vertical line, above arrow -->
<text x="1738" y="722" class="card">1</text>

<!-- 8. Cashier ───▶ Bill (creates, 1 → 0..*)
     Route: (1310,640) → (1310,670) → (1115,670) → (1115,730)
     Horizontal segment at y=670 has 195px of room.
     Label ABOVE segment, cardinalities tucked in corners. -->
<polyline points="1310,640 1310,670 1115,670 1115,730"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#arr)"/>
<text x="1215" y="662" text-anchor="middle" class="rlbl">creates</text>
<!-- card at Cashier (start) - on vertical segment, offset right -->
<text x="1318" y="658" class="card">1</text>
<!-- card at Bill (arrow) - on vertical segment, offset right -->
<text x="1123" y="722" class="card">0..*</text>

<!-- 9. Admin ───▶ Inventory (manages, 1 → 1)
     Route: (570,640) → (570,670) → (810,670) → (810,730)
     Horizontal segment at y=670 has 240px of room. -->
<polyline points="570,640 570,670 810,670 810,730"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#arr)"/>
<text x="690" y="662" text-anchor="middle" class="rlbl">manages</text>
<text x="578" y="658" class="card">1</text>
<text x="818" y="722" class="card">1</text>

<!-- 10. Refund ───▶ Transaction (references, 0..* → 1)
      Route: (170,1180) → (170,1140) → (1730,1140) → (1730,990)
      Very long horizontal at y=1140. Label positioned well clear of nearby labels. -->
<polyline points="170,1180 170,1140 1730,1140 1730,990"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#arr)"/>
<text x="900" y="1132" text-anchor="middle" class="rlbl">references</text>
<!-- card at Refund start (near vertical segment) - offset right of vertical line -->
<text x="178" y="1168" class="card">0..*</text>
<!-- card at Transaction end (vertical segment going up) - offset right -->
<text x="1738" y="1004" class="card">1</text>

<!-- 11. SalesReport ───▶ Transaction (reads, 1 → 0..*)
      Exit SalesReport at the middle divider line (y=1304) and extend that
      divider HORIZONTALLY to the right before turning down. This makes the
      arrow visually originate from the divider line rather than just dropping
      straight down out of nowhere.
      Route: (790,1304) → (820,1304) → (820,1550) → (1780,1550) → (1780,990) -->
<polyline points="790,1304 820,1304 820,1550 1780,1550 1780,990"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#arr)"/>
<text x="1300" y="1542" text-anchor="middle" class="rlbl">reads</text>
<!-- card at SalesReport start (on first horizontal segment, above line) -->
<text x="798" y="1298" class="card">1</text>
<!-- card at Transaction end (on vertical going up, offset right of arrow) -->
<text x="1788" y="1010" class="card">0..*</text>

<!-- 12. SessionManager ───▶ User (monitors, 1 → 1)
      Exit SessionManager from the CENTER of its top edge at (1125, 1180).
      Previous route at y=1290 cut through Settings (x=1460-1740, y=1180-1380).
      New route goes UP out of SessionManager, across the narrow lane at y=1170
      (which sits just ABOVE Settings' top edge y=1180), then up the right margin,
      and left to User's right edge.
      Route: (1125,1180) → (1125,1170) → (1880,1170) → (1880,160) → (1090,160)
      Collision checks on horizontal at y=1170 from x=1125 to x=1880:
        - Settings top edge is at y=1180, so y=1170 clears it.
        - Settings→User uses y=1160 from x=955 to x=1600; y=1170 is different.
        - Refund→Trans uses y=1140; different.
      Vertical at x=1880 from y=1170 to y=160: clear of all class boxes
      (rightmost class Transaction ends at x=1870). -->
<polyline points="1125,1180 1125,1170 1880,1170 1880,160 1090,160"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#arr)"/>
<text x="1480" y="152" text-anchor="middle" class="rlbl">monitors</text>
<!-- card at SessionManager start (on short vertical going up, offset right) -->
<text x="1133" y="1178" class="card">1</text>
<!-- card at User end (on horizontal going left into User, below line) -->
<text x="1100" y="180" class="card">1</text>

<!-- 13. Settings — NO outgoing relationship
      Previously Settings → User (theme applied to), but Settings is a system-wide
      config (theme saved to settings.txt), not tied to any specific User object.
      Removed for semantic accuracy — Settings is now a standalone utility class. -->

<!-- 14. Admin ───▶ Refund (approves, 1 → 0..*)
      Exit Admin's left edge at (420, 500) — center of the left edge.
      Route: (420,500) → (15,500) → (15,1300) → (30,1300)
      Label "approves" placed HORIZONTALLY above the TOP horizontal segment
      at y=500 (between x=15 and x=420), sitting clearly above the arrow.
      Cardinality "0..*" moved OUTSIDE the Refund box — it was previously at
      x=34 which put it inside Refund (x=30-310). Now at x=18, y=1292 it sits
      just OUTSIDE the left edge of Refund, on the outgoing horizontal segment. -->
<polyline points="420,500 15,500 15,1300 30,1300"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#arr)"/>
<!-- horizontal label above the top segment -->
<text x="210" y="490" text-anchor="middle" class="rlbl">approves</text>
<!-- card at Admin start (above the line, just outside Admin left edge) -->
<text x="408" y="490" text-anchor="end" class="card">1</text>
<!-- card at Refund end (BELOW the arrow line, OUTSIDE Refund left edge at x=30)
     Placed at y=1316, which is 16px below the horizontal arrow segment at y=1300,
     so the label sits clearly below the line instead of touching it. -->
<text x="28" y="1316" text-anchor="end" class="card">0..*</text>

<!-- ═══════════════════════════════════════════════════════════════
     ADDITIONAL RELATIONSHIPS (added based on feature descriptions
     in Project_Context.md)
     ═══════════════════════════════════════════════════════════════ -->

<!-- 15. Cashier ───▶ Refund (processes, 1 → 0..*)
      Per feature #5: "Allows cashiers to process product returns."
      Cashier is top-right, Refund is bottom-left — long path required.
      Route goes out Cashier's right edge, down the far-right margin
      (clear of Session→User which uses x=1880 only up to y=1170),
      across the bottom lane at y=1620 (below row 4 which ends y=1440),
      and up into Refund's bottom edge at x=200.
      Route: (1460,500) → (1895,500) → (1895,1620) → (200,1620) → (200,1440) -->
<polyline points="1460,500 1895,500 1895,1620 200,1620 200,1440"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#arr)"/>
<text x="1000" y="1612" text-anchor="middle" class="rlbl">processes</text>
<!-- card at Cashier start (on horizontal going right, above line) -->
<text x="1472" y="494" class="card">1</text>
<!-- card at Refund end (on vertical going up to arrow, offset right of line) -->
<text x="208" y="1460" class="card">0..*</text>

<!-- 16. Refund ───▶ Inventory (updates, 0..* → 1)
      Per feature #5: "automatically update inventory and transaction records."
      Exit Refund from top edge at x=250 (right of x=170 used by Refund→Trans).
      Route up through narrow clear lane at y=1165 (above Refund top y=1180,
      below SessionManager→User line at y=1170 — but at x<1125 Session line
      doesn't exist, so y=1165 is clear here).
      Then right to x=680 (just inside Inventory left edge at x=670),
      up to Inventory bottom at (680, 970).
      Route: (250,1180) → (250,1165) → (680,1165) → (680,970) -->
<polyline points="250,1180 250,1165 680,1165 680,970"
  stroke="#111" stroke-width="1.4" fill="none"
  marker-end="url(#arr)"/>
<text x="465" y="1158" text-anchor="middle" class="rlbl">updates</text>
<!-- card at Refund start (on short vertical going up, offset right) -->
<text x="258" y="1178" class="card">0..*</text>
<!-- card at Inventory end (on vertical going up into arrow, offset right) -->
<text x="688" y="990" class="card">1</text>

<!-- 17. SalesReport ───▶ Product (reads top sellers, 1 → 0..*)
      Per feature #6: "top-selling products over a selected time period."
      SalesReport needs to read Product data to identify top sellers.
      Simple vertical route — single straight line from SalesReport top to
      Product bottom at x=550, crossing Bill→Product (y=1120) and
      Refund→Transaction (y=1140) perpendicularly — these are acceptable
      clean crossings, not overlaps.
      Route: (550,1180) → (550,1010) -->
<line x1="550" y1="1180" x2="550" y2="1010"
  stroke="#111" stroke-width="1.4"
  marker-end="url(#arr)"/>
<text x="558" y="1100" class="rlbl">reads</text>
<!-- card at SalesReport start (offset right of line, just above class top) -->
<text x="558" y="1178" class="card">1</text>
<!-- card at Product end (offset right of line, just below Product bottom) -->
<text x="558" y="1024" class="card">0..*</text>

</svg>
</div>
